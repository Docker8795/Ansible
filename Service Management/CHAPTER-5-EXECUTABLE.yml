        msg: |
          ==========================================
          SERVICE ENABLE/DISABLE COMMANDS
          ==========================================
          
          Enable service (start on boot):
          $ systemctl enable service-name
          $ systemctl enable --now service-name (enable + start)
          
          Disable service (don't start on boot):
          $ systemctl disable service-name
          
          Check if enabled:
          $ systemctl is-enabled service-name
          
          View enabled services:
          $ systemctl list-unit-files --state=enabled
          $ systemctl list-unit-files --state=disabled
          
          In Ansible:
          systemd:
            name: service-name
            enabled: yes      (or no)
            state: started    (or stopped)
          ==========================================

    # ==========================================================
    # TASK 5.37: Display journalctl tips
    # ==========================================================
    - name: 5.37 - Display journalctl (logging) tips
      ansible.builtin.debug:
        msg: |
          ==========================================
          JOURNALCTL LOGGING TIPS
          ==========================================
          
          View logs:
          $ journalctl                    (all logs)
          $ journalctl -n 50              (last 50 lines)
          $ journalctl -f                 (follow/tail)
          
          Filter by service:
          $ journalctl -u service-name
          $ journalctl -u service-name -n 20
          
          Filter by priority:
          $ journalctl -p err             (errors only)
          $ journalctl -p warning,err     (warnings + errors)
          
          Time-based filters:
          $ journalctl --since "2024-01-01"
          $ journalctl --since "1 hour ago"
          $ journalctl --until "30 minutes ago"
          
          Show boot logs:
          $ journalctl -b                 (current boot)
          $ journalctl -b -1              (previous boot)
          $ journalctl --list-boots       (all boots)
          
          Export logs:
          $ journalctl -o export > logs.bin
          $ journalctl -o json            (JSON format)
          $ journalctl -o short-iso       (ISO timestamps)
          
          Combine filters:
          $ journalctl -u service-name -p err -n 20 -f
          ==========================================

    # ==========================================================
    # TASK 5.38: Display systemd socket services
    # ==========================================================
    - name: 5.38 - Display socket activation explanation
      ansible.builtin.debug:
        msg: |
          ==========================================
          SOCKET ACTIVATION
          ==========================================
          
          What is socket activation?
          - Service doesn't run until needed
          - Systemd listens on socket
          - Service starts when connection arrives
          - Reduces boot time and memory usage
          
          Benefits:
          - Faster boot
          - Lower memory usage
          - Service starts on demand
          - Automatic restart
          - Transparent to applications
          
          Socket file example:
          [Unit]
          Description=My Service Socket
          Before=multi-user.target
          
          [Socket]
          ListenStream=9000
          Accept=yes
          
          [Install]
          WantedBy=sockets.target
          
          View active sockets:
          $ systemctl list-sockets
          $ systemctl list-units --type=socket
          
          Check socket status:
          $ systemctl status socket-name.socket
          ==========================================

    # ==========================================================
    # TASK 5.39: Display target dependencies
    # ==========================================================
    - name: 5.39 - Display target and runlevel information
      ansible.builtin.debug:
        msg: |
          ==========================================
          SYSTEMD TARGETS & RUNLEVELS
          ==========================================
          
          Runlevel to Target mapping:
          runlevel 0 → poweroff.target
          runlevel 1 → rescue.target
          runlevel 2 → multi-user.target (no graphics)
          runlevel 3 → multi-user.target (no graphics)
          runlevel 4 → multi-user.target (unused)
          runlevel 5 → graphical.target (with graphics)
          runlevel 6 → reboot.target
          
          Get default target:
          $ systemctl get-default
          
          Set default target:
          $ systemctl set-default graphical.target
          $ systemctl set-default multi-user.target
          
          Change target on fly:
          $ systemctl isolate multi-user.target
          $ systemctl isolate graphical.target
          
          View target dependencies:
          $ systemctl list-dependencies multi-user.target
          $ systemctl list-dependencies --all multi-user.target
          
          Important targets:
          - poweroff.target: Shutdown
          - rescue.target: Single user/maintenance
          - multi-user.target: Command line
          - graphical.target: GUI desktop
          - emergency.target: Emergency shell
          - reboot.target: Reboot
          ==========================================

