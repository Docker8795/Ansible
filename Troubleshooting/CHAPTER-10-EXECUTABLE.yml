    - name: 10.50 - Create comprehensive troubleshooting report
      ansible.builtin.copy:
        content: |
          ==========================================
          LINUX TROUBLESHOOTING REFERENCE GUIDE
          ==========================================
          Generated on: {{ ansible_date_time.iso8601 }}
          Hostname: {{ inventory_hostname }}
          OS: {{ ansible_os_family }} {{ ansible_distribution_version }}
          
          ==========================================
          TROUBLESHOOTING METHODOLOGY
          ==========================================
          
          1. Identify the problem
          2. Gather information
          3. Develop hypothesis
          4. Test hypothesis
          5. Implement solution
          6. Verify resolution
          7. Prevent recurrence
          
          Key: Be systematic, change one thing at a time
          
          ==========================================
          ISSUE CATEGORIES
          ==========================================
          
          SYSTEM ISSUES:
          - High CPU usage
          - High memory usage
          - Disk full
          - High load average
          - System hanging
          - Kernel panic
          
          NETWORK ISSUES:
          - No connectivity
          - DNS not working
          - Slow network
          - SSH not working
          - Lost packets
          - Connection refused
          
          SERVICE ISSUES:
          - Service won't start
          - Service crashes
          - Port conflicts
          - Permission denied
          - Service hangs
          - Timeout errors
          
          STORAGE ISSUES:
          - Filesystem corruption
          - Inode exhaustion
          - Quota exceeded
          - LVM problems
          - Mount failures
          - I/O performance
          
          SECURITY ISSUES:
          - Permission denied
          - SELinux blocking
          - Firewall blocking
          - SSH key issues
          - Sudo problems
          - File integrity
          
          ==========================================
          ESSENTIAL COMMANDS
          ==========================================
          
          PERFORMANCE:
          top - Process monitoring
          vmstat - Memory/CPU stats
          iostat - I/O statistics
          iotop - I/O processes
          ps - Process list
          
          NETWORK:
          ip - IP configuration
          ss - Socket statistics
          ping - Connectivity test
          traceroute - Path trace
          nslookup - DNS query
          dig - DNS details
          
          STORAGE:
          df - Disk usage
          du - Directory usage
          fsck - Filesystem check
          lsof - Open files
          
          LOGGING:
          journalctl - System logs
          tail - File tail
          grep - Pattern search
          
          ==========================================
          COMMON ISSUE SOLUTIONS
          ==========================================
          
          HIGH CPU:
          Identify: top or ps
          Kill: kill -9 PID
          Restart: systemctl restart service
          
          HIGH MEMORY:
          Identify: free -h or top
          Kill: kill -9 PID
          Restart: systemctl restart service
          
          DISK FULL:
          Clear: rm old files, clear cache
          Archive: tar -gz old data
          Extend: Expand LVM or partition
          
          NO CONNECTIVITY:
          Check: ip addr show, ip route show
          Test: ping gateway, ping 8.8.8.8
          Fix: Configure interface, check firewall
          
          DNS NOT WORKING:
          Check: cat /etc/resolv.conf
          Test: nslookup google.com
          Fix: Add nameserver, update /etc/hosts
          
          SERVICE WON'T START:
          Check: systemctl status, journalctl -u
          Test: /usr/bin/service --foreground
          Fix: Check config, permissions, dependencies
          
          ==========================================
          DIAGNOSTIC WORKFLOW
          ==========================================
          
          1. System Check
          uptime
          free -h
          df -h
          ps aux --sort=-%cpu | head
          
          2. Network Check
          ip addr show
          ip route show
          ping 8.8.8.8
          nslookup google.com
          
          3. Service Check
          systemctl status
          journalctl -p err
          ss -tulpn | head
          
          4. Log Analysis
          journalctl --since today
          tail -f /var/log/syslog
          grep ERROR /var/log/syslog
          
          5. Performance Check
          vmstat 1 5
          iostat -x 1 5
          top -b -n 1 | head -20
          
          ==========================================
          RECOVERY PROCEDURES
          ==========================================
          
          Cannot Boot:
          1. Boot recovery mode
          2. Mount filesystem
          3. Fix fstab or grub
          4. Reboot
          
          Cannot SSH:
          1. Physical console access
          2. Check network
          3. Check SSH service
          4. Check firewall
          
          Out of Space:
          1. Identify large files
          2. Remove old logs/cache
          3. Archive data
          4. Extend filesystem
          
          Service Crashed:
          1. Check logs
          2. Fix configuration
          3. Restart service
          4. Monitor for recurrence
          
          ==========================================
          PREVENTION STRATEGIES
          ==========================================
          
          Monitoring:
          - CPU, memory, disk usage
          - Network connectivity
          - Service status
          - Error rates
          
          Alerting:
          - CPU >80%
          - Memory >85%
          - Disk >90%
          - Service down
          - Errors in logs
          
          Maintenance:
          - Regular log rotation
          - Clean old files
          - Update software
          - Check disk integrity
          
          Documentation:
          - System configuration
          - Common issues
          - Recovery procedures
          - Change logs
          
          ==========================================
          NEXT STEPS
          ==========================================
          
          1. Practice troubleshooting on test systems
          2. Create playbooks for common fixes
          3. Set up monitoring and alerting
          4. Document your environment
          5. Share knowledge with team
          6. Keep procedures updated
          
          ==========================================
